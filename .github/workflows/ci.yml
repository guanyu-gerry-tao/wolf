name: CI

# Run on every push to main, and on every PR targeting main or feat/* branches
# 每次 push 到 main，或者向 main / feat/* 开 PR 时自动运行
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - "feat/**"

jobs:
  # Type check is its own job so it lights up as a separate PR status check
  # and runs in parallel with build/test for faster overall feedback.
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npm test
