<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>wolf resume shell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-size: 11pt;
      --line-height: 1.3;
      --margin-in: 0.5in;
    }
    @page {
      size: letter;
      margin: var(--margin-in);
    }
    html, body {
      font-family: "Inter", "Helvetica Neue", sans-serif;
      font-size: var(--font-size);
      line-height: var(--line-height);
      margin: 0;
      padding: 0;
      color: #222;
      -webkit-font-smoothing: antialiased;
    }
    p, li {
      widows: 2;
      orphans: 2;
      hyphens: auto;
      -webkit-hyphens: auto;
      /* text-wrap: pretty reshapes earlier lines to avoid single-word
         last lines (the colloquial "widow" in typography). The CSS
         `widows` property above only controls page-break widows; pretty
         handles the line-break case. Chrome 117+. */
      text-wrap: pretty;
    }
    h1, h2, h3 {
      break-inside: avoid;
      page-break-inside: avoid;
      text-wrap: balance;
    }
  </style>
</head>
<body id="resume-root">
  <!-- body content injected by the driver at render time -->
</body>
</html>
